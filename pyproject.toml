[project]
name = "pydajet-metadata"
version = "0.0.0"
description = "..."
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
]

[build-system]
requires = [
    "setuptools>=64.0.3",
    "tomli>=2.4.1",
]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
dajet_metadata = ["bin/**/*"]

[tool.dajet]
version = "5.0.0-alpha"
