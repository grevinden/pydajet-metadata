[project]
name = "pydajet-metadata"
version = "0.0.0"
description = "..."
requires-python = ">=3.13"
dependencies = [
    "httpx>=1.0.dev3",

]

[build-system]
requires = [
    "setuptools>=82.0.1",
    "tomli>=2.4.1",
]
build-backend = "setuptools.build_meta"
package=true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
pydajet_metadata = ["bin/**/*"]

[tool.dajet]
version = "5.0.0-alpha"

[tool.uv]
verbose = true
